<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>งานเอกสารขาย/บริการ | D-Excel Workplace</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="icon" type="image/png" href="icona.png">

  <style>
    :root {
      --brand-blue: #0866b2;
      --brand-blue-dark: #00549a;
      --card-bg: #ffffff;
      --text-dark: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--brand-blue);
      color: var(--text-dark);
      font-family: "Noto Sans Thai", sans-serif;
    }

    header {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 22px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 700;
    }

    .logo {
      width: 190px;
      max-height: 85px;
      object-fit: contain;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 22px 55px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .menu-card {
      min-height: 210px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      color: var(--text-dark);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      text-align: center;
    }

    .menu-card.disabled {
      opacity: 0.68;
      cursor: default;
    }

    .icon-box {
      width: 64px;
      height: 64px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #fff3e8;
      font-size: 32px;
    }

    .menu-card h2 {
      margin: 0;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.5;
    }

    footer {
      padding: 16px 20px;
      background: var(--brand-blue-dark);
      color: #ffffff;
      text-align: center;
      font-size: 13px;
    }

    @media (max-width: 700px) {
      header {
        padding: 20px 16px 8px;
      }

      header h1 {
        font-size: 23px;
      }

      .logo {
        width: 135px;
      }

      main {
        padding: 18px 14px 40px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .menu-card {
        min-height: 175px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>งานเอกสารขาย/บริการ</h1>
    <img src="logo.png" alt="D-Excel Logo" class="logo">
  </header>

  <main>

    <a href="index.html" class="back-link">← กลับหน้าหลัก</a>

    <section class="menu-grid">

      <div class="menu-card disabled">
        <div class="icon-box">🧾</div>
        <h2>สร้างใบเสนอราคา</h2>
      </div>

    </section>

  </main>

  <footer>
    <span id="copyright"></span>
  </footer>

  <script>
    document.getElementById("copyright").textContent =
      `© ${new Date().getFullYear()} D-Excel. All rights reserved.`;
  </script>

</body>
</html>
