<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>สร้างเอกสารขาย/บริการ | D-Excel Workplace</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="icon" type="image/png" href="icona.png">

  <style>
    :root {
      --brand-blue: #0866b2;
      --brand-blue-dark: #00549a;
      --card-bg: #ffffff;
      --text-dark: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--brand-blue);
      color: var(--text-dark);
      font-family: "Noto Sans Thai", sans-serif;
    }

    header {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 22px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    header h1 {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 700;
    }

    .logo {
      width: 190px;
      max-height: 85px;
      object-fit: contain;
    }

    main {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 22px 55px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 22px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .menu-card {
      min-height: 210px;
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--card-bg);
      color: var(--text-dark);
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
      text-align: center;
      text-decoration: none;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 13px 28px rgba(0, 0, 0, 0.24);
    }

    .menu-card:focus-visible {
      outline: 4px solid rgba(255, 255, 255, 0.75);
      outline-offset: 4px;
    }

    .icon-box {
      width: 64px;
      height: 64px;
      flex: 0 0 64px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #fff3e8;
      font-size: 32px;
    }

    .menu-card h2 {
      width: 100%;
      max-width: 430px;
      min-height: 64px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      font-weight: 700;
      line-height: 1.5;
      text-wrap: balance;
    }

    @media (max-width: 700px) {
      header {
        padding: 20px 16px 8px;
      }

      header h1 {
        font-size: 23px;
      }

      .logo {
        width: 135px;
      }

      main {
        padding: 18px 14px 40px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .menu-card {
        min-height: 175px;
        padding: 24px 18px;
      }

      .menu-card h2 {
        min-height: 58px;
        font-size: 19px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>สร้างเอกสารขาย/บริการ</h1>
    <img src="logo.png" alt="D-Excel Logo" class="logo">
  </header>

  <main>

    <a href="index.html" class="back-link">
      ← กลับหน้าหลัก
    </a>

    <section class="menu-grid">

      <a
        href="https://script.google.com/macros/s/AKfycbwkEqqNnB9yRrea4BezmYqJ5VzfbLvDloOHas5J_GUD-8_MnGU-G3hhyTMBNYf9rTPblw/exec"
        class="menu-card"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="icon-box">🧾</div>
        <h2>สร้างใบเสนอราคา</h2>
      </a>

      <a
        href="https://script.google.com/macros/s/AKfycbwBHlh6bCQ_EWDyjBNK-tEVDeiTF-e_-uiDJWNfMF6C5zMILWO7rNpik8Arzr2r_uZq/exec"
        class="menu-card"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="icon-box">📦</div>
        <h2>
          สร้างใบเบิกสินค้า / ใบส่งสินค้า / ใบสรุปต้นทุนสินค้าติดตั้ง
        </h2>
      </a>

      <a
        href="https://script.google.com/macros/s/AKfycbxEhYRd_vE5jez4JLSVlo37maGRfcJWkmPgNMWwoXMgVr29P6a3V5PMURSFfvfkHntoaw/exec"
        class="menu-card"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="icon-box">🛒</div>
        <h2>สร้างใบสั่งซื้อ</h2>
      </a>

      <a
        href="https://script.google.com/macros/s/AKfycbxQGzjkb0_v0Ch9HRf77jjSwBSqcquk1SOYH8jS-He41WwJ5LIdtuItqUBVxpya4IR3/exec"
        class="menu-card"
        target="_blank"
        rel="noopener noreferrer"
      >
        <div class="icon-box">🏪</div>
        <h2>
          สร้างใบสรุปสินค้าเข้า-ออกและยอดคงเหลือร้านค้าฝากขาย
        </h2>
      </a>

    </section>

  </main>

</body>
</html>
